<html>
<head>
    <title>threeD</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            display:flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: black;
            perspective: 1000px;
            overflow: hidden;
        }
        h1{
            position: absolute;
            top: 40px;
            color: rgb(108, 202, 245);
            font-size: 3rem;
            font-family: Arial, sans-serif;
            z-index: 1000;
            text-shadow: 0 0 15px rgb(0, 187, 255);
        }

        .box{
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            animation: animate 20s linear infinite;
        }

        @keyframes animate{
            0%{
                transform: rotateY(0deg);
            }
            100%{
                transform: rotateY(-360deg);
            }
        }

        .box span{
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: center; 
            transform-style: preserve-3d;
            transform: rotateY(calc(var(--i)*45deg)) translateZ(400px);
            -webkit-box-reflect: below 10px linear-gradient(transparent,transparent,#0004);
        }

        .box span img{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid white;
            border-radius: 18px;
            object-fit: cover;
        }

    </style>
</head>

<body>

    <h1>🎉🎈🥰Happy Birthday Maa🤗🫂🎊</h1>

    <div class="box">
        <span style="--i:1"><img src="images/Wh20.jpeg"></span>
        <span style="--i:2"><img src="images/Wh21.jpeg" alt="#"></span>
        <span style="--i:3"><img src="images/Wh22.jpeg" alt="#"></span>
        <span style="--i:4"><img src="images/Wh23.jpeg" alt="#"></span>
        <span style="--i:5"><img src="images/Wh24.jpeg" alt="#"></span>
        <span style="--i:6"><img src="images/Wh25.jpeg" alt="#"></span>
        <span style="--i:7"><img src="images/Wh26.jpeg" alt="#"></span>
        <span style="--i:8"><img src="images/Wh27.jpeg" alt="#"></span>
    </div>

</body>
</html>
